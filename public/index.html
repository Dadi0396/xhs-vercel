<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书爆款文案工作台 - 自动化版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{ --red:#D93025;--red2:#FFF0EE;--ink:#1C1410;--ink2:#4B3F38;--ink3:#9C8F87; --cream:#FDFAF6;--cream2:#F5F0E8;--cream3:#EDE5D8;--gold:#C8954A; --green:#2A6B4A;--green2:#EAF3ED;--border:#E2D9CE; --shadow:0 2px 12px rgba(28,20,16,.08);--r:10px; }
body{font-family:'Noto Serif SC',serif;background:var(--cream);color:var(--ink);min-height:100vh;line-height:1.7}
.header{background:var(--ink);color:var(--cream);padding:0 40px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600}
.logo-dot{width:24px;height:24px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:'DM Mono',monospace}
.steps{display:flex;gap:4px;align-items:center;font-family:'DM Mono',monospace;font-size:11px}
.sp{padding:4px 12px;border-radius:20px;color:#888;cursor:pointer;transition:all .2s;border:1px solid transparent}
.sp.active{background:var(--red);color:#fff}
.sp.done{color:var(--gold);border-color:rgba(200,149,74,.3)}
.sep{color:#555;font-size:10px}
.main{max-width:880px;margin:0 auto;padding:40px 24px 80px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:28px 32px;margin-bottom:20px;box-shadow:var(--shadow)}
.ct{font-size:12px;font-family:'DM Mono',monospace;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.cn{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;font-weight:600}
.cn-ink{background:var(--ink);color:var(--cream)}
.cn-red{background:var(--red);color:#fff}
.cn-green{background:var(--green);color:#fff}
.fr{margin-bottom:16px}
label{display:block;font-size:12px;font-family:'DM Mono',monospace;color:var(--ink2);margin-bottom:6px;letter-spacing:.03em}
input[type=text],input[type=password],textarea,select,input[type=number]{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:'Noto Serif SC',serif;color:var(--ink);background:var(--cream);transition:border-color .2s,box-shadow .2s;outline:none;resize:vertical}
input[type=text]:focus,input[type=password]:focus,textarea:focus,select:focus,input[type=number]:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(217,48,37,.08);background:#fff}
input[type=password]{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.05em}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 22px;border-radius:6px;font-size:14px;font-family:'Noto Serif SC',serif;font-weight:600;cursor:pointer;border:none;transition:all .18s;white-space:nowrap}
.btn-p{background:var(--red);color:#fff}
.btn-p:hover{background:#C0271D;transform:translateY(-1px);box-shadow:0 4px 16px rgba(217,48,37,.3)}
.btn-s{background:var(--cream2);color:var(--ink2);border:1px solid var(--border)}
.btn-s:hover{background:var(--cream3)}
.btn-g{background:transparent;color:var(--ink3);border:1px solid var(--border)}
.btn-g:hover{color:var(--ink);border-color:var(--ink3)}
.btn-gr{background:var(--green);color:#fff}
.btn-gr:hover{background:#1F5239;transform:translateY(-1px)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.br{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.alert{padding:12px 16px;border-radius:6px;font-size:13px;margin-top:12px;display:flex;align-items:flex-start;gap:8px;line-height:1.6}
.ai{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.as{background:var(--green2);color:var(--green);border:1px solid #BBD9C8}
.ae{background:var(--red2);color:var(--red);border:1px solid #F5C4BE}
.aw{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.pw{margin-top:14px}
.pb-bg{height:4px;background:var(--cream3);border-radius:4px;overflow:hidden;margin-bottom:8px}
.pb{height:100%;background:var(--red);border-radius:4px;transition:width .4s ease;width:0%}
.plog{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);max-height:72px;overflow-y:auto;line-height:1.8}
.rb{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:18px;margin-top:14px}
.rb-top{font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.rt{font-size:13px;color:var(--ink);white-space:pre-wrap;line-height:1.9;word-break:break-all}
.kg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.kc{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.kc-l{font-size:10px;font-family:'DM Mono',monospace;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.kc-c{font-size:13px;color:var(--ink2);line-height:1.7}
.cb{font-size:11px;font-family:'DM Mono',monospace;padding:4px 10px;border-radius:4px;background:var(--cream2);border:1px solid var(--border);color:var(--ink3);cursor:pointer;transition:all .15s}
.cb:hover{background:var(--cream3);color:var(--ink)}
.cb.copied{background:var(--green2);color:var(--green);border-color:#BBD9C8}
.sec{display:none}.sec.active{display:block}
hr.dv{border:none;border-top:1px solid var(--border);margin:20px 0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.spin-d{border-color:rgba(28,20,16,.15);border-top-color:var(--ink2)}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-family:'DM Mono',monospace}
.tr{background:var(--red2);color:var(--red)}
.tg{background:var(--green2);color:var(--green)}
.to{background:#FEF3C7;color:var(--gold)}
.hint{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);margin-top:5px;padding:6px 10px;background:var(--cream2);border-radius:4px;line-height:1.6}
.preview-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
.preview-table th{background:var(--cream2);color:var(--ink2);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:8px 12px;border:1px solid var(--border);text-align:left}
.preview-table td{padding:8px 12px;border:1px solid var(--border);color:var(--ink2);vertical-align:top;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-table tr:nth-child(even) td{background:var(--cream)}
.col-map-label{font-size:12px;font-family:'DM Mono',monospace;color:var(--ink2);white-space:nowrap}
@media(max-width:640px){.main{padding:20px 16px 60px}.card{padding:18px 16px}.f2{grid-template-columns:1fr}.kg{grid-template-columns:1fr}.header{padding:0 16px}.steps{display:none}}
</style>
</head>
<body>
<header class="header">
  <div class="logo"><div class="logo-dot">红</div>小红书爆款文案工作台</div>
  <div class="steps">
    <span class="sp active" id="nav-1" onclick="goStep(1)">① 配置</span><span class="sep">›</span>
    <span class="sp" id="nav-2" onclick="goStep(2)">② 读取文案库</span><span class="sep">›</span>
    <span class="sp" id="nav-3" onclick="goStep(3)">③ AI分析</span><span class="sep">›</span>
    <span class="sp" id="nav-4" onclick="goStep(4)">④ 写文案</span>
  </div>
</header>
<main class="main">

<div class="sec active" id="step-1">
  <div class="card">
    <div class="ct"><span class="cn cn-ink">1</span>飞书 API 凭证</div>
    <div class="f2">
      <div class="fr"><label>App ID</label><input type="text" id="appId" placeholder="cli_xxx"></div>
      <div class="fr"><label>App Secret</label><input type="password" id="appSecret" placeholder="••••••••"></div>
    </div>
  </div>
  <div class="card">
    <div class="ct"><span class="cn cn-ink">2</span>爆款文案库（飞书电子表格）</div>
    <div class="fr"><label>飞书电子表格链接</label><input type="text" id="sheetUrl" placeholder="https://xxx.feishu.cn/sheets/xxxxxx"></div>
    <div class="fr"><label>工作表名称（可选，填写后将精准匹配）</label><input type="text" id="sheetName" placeholder="例如：文案库"></div>
  </div>
  <div class="card">
    <div class="ct"><span class="cn cn-red">3</span>输出多维表格链接 <span class="tag to">必须填写才能写入飞书</span></div>
    <div class="fr"><label>知识点总结表格</label><input type="text" id="knowledgeTableUrl" placeholder="粘贴多维表格链接"></div>
    <div class="fr"><label>生成文案表格</label><input type="text" id="copyTableUrl" placeholder="粘贴多维表格链接"></div>
  </div>
  <div class="br"><button class="btn btn-p" onclick="step1Next()">验证配置并继续 →</button></div>
  <div id="s1-status"></div>
</div>

<div class="sec" id="step-2">
  <div class="card">
    <div class="ct"><span class="cn cn-ink">2</span>读取飞书电子表格</div>
    <div class="br">
      <button class="btn btn-p" id="btn-fetch" onclick="fetchSheet()">开始读取表格</button>
      <button class="btn btn-g" onclick="goStep(1)">← 返回</button>
    </div>
    <div class="pw" id="fetch-pw" style="display:none"><div class="pb-bg"><div class="pb" id="fetch-pb"></div></div><div class="plog" id="fetch-log"></div></div>
    <div id="s2-status"></div>
  </div>
  <div class="card" id="col-map-card" style="display:none">
    <div class="ct"><span class="cn cn-ink">确认字段映射</span></div>
    <div style="display:grid;grid-template-columns:auto 1fr;gap:8px 16px;align-items:center" id="col-map-wrap"></div>
    <div class="br" style="margin-top:16px"><button class="btn btn-p" onclick="confirmColMap()">确认映射并解析 →</button></div>
    <div id="col-map-status"></div>
  </div>
  <div class="card" id="data-preview-card" style="display:none">
    <div class="ct"><span class="cn cn-green">✓</span>读取结果预览</div>
    <div style="overflow-x:auto"><table class="preview-table" id="preview-table"></table></div>
    <div class="br" style="margin-top:16px"><button class="btn btn-p" onclick="goStep(3)">进入 AI 分析 →</button></div>
  </div>
</div>

<div class="sec" id="step-3">
  <div class="card">
    <div class="ct"><span class="cn cn-red">3</span>AI 分析爆款规律</div>
    <div class="fr"><label>品类补充说明（可选）</label><input type="text" id="catHint" placeholder="例如：苏打饼干"></div>
    <div class="br">
      <button class="btn btn-p" id="btn-analyze" onclick="analyzeDoc()">开始通义千问深度分析</button>
      <button class="btn btn-g" onclick="goStep(2)">← 返回</button>
    </div>
    <div class="pw" id="analyze-pw" style="display:none"><div class="pb-bg"><div class="pb" id="analyze-pb"></div></div><div class="plog" id="analyze-log"></div></div>
    <div id="s3-status"></div>
    <div id="k-save-status"></div>
  </div>
  <div id="knowledge-result" style="display:none">
    <div class="card">
      <div class="ct"><span class="cn cn-green">✓</span>AI 总结的写作知识点 (已自动同步)</div>
      <div class="kg" id="kg-grid"></div>
      <hr class="dv">
      <div class="rb"><div class="rt" id="full-report"></div></div>
      <div class="br" style="margin-top:16px">
        <button class="btn btn-p" onclick="goStep(4)">去写文案 →</button>
      </div>
    </div>
  </div>
</div>

<div class="sec" id="step-4">
  <div class="card">
    <div class="ct"><span class="cn cn-red">4</span>生成爆款文案</div>
    <div class="f2">
      <div class="fr"><label>产品名称</label><input type="text" id="prodName" placeholder="输入产品名"></div>
      <div class="fr"><label>核心卖点</label><input type="text" id="prodSell" placeholder="输入卖点"></div>
    </div>
    <div class="fr" style="width: 50%;"><label>生成数量</label><input type="number" id="genCount" value="3" min="1" max="10"></div>
    <div class="br"><button class="btn btn-p" id="btn-gen" onclick="generateCopy()">一键生成并同步飞书</button></div>
    <div class="pw" id="gen-pw" style="display:none"><div class="pb-bg"><div class="pb" id="gen-pb"></div></div></div>
    <div id="s4-status"></div>
    <div id="c-save-status"></div>
  </div>
  <div id="copy-results" style="display:none">
    <div id="copy-cards"></div>
  </div>
</div>
</main>

<script>
const PROXY_BASE = window.location.origin + '/api/proxy?url=';
function proxyUrl(url) { return PROXY_BASE + encodeURIComponent(url); }
const S = { token: null, tokenExp: 0, docContent: '', rawRows: [], headers: [], colMap: {}, knowledge: null, copies: [] };
function $(id) { return document.getElementById(id); }

window.onload = function() {
  const fields = ['appId', 'appSecret', 'sheetUrl', 'sheetName', 'knowledgeTableUrl', 'copyTableUrl'];
  fields.forEach(id => {
    const val = localStorage.getItem('xhs_' + id);
    if (val) $(id).value = val;
  });
};

function goStep(n) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
  document.getElementById('step-' + n).classList.add('active');
  document.querySelectorAll('.sp').forEach((p, i) => {
    p.classList.remove('active', 'done');
    if (i + 1 === n) p.classList.add('active');
    else if (i + 1 < n) p.classList.add('done');
  });
}

function setStatus(id, html, type = 'ai') { const el = $(id); if (el) el.innerHTML = html ? `<div class="alert ${type}">${html}</div>` : ''; }
function log(id, msg) { const el = $(id); if (el) { el.innerHTML += msg + '<br>'; el.scrollTop = el.scrollHeight; } }
function setBar(id, pct) { const el = $(id); if (el) el.style.width = pct + '%'; }
function showPw(id) { const el = $(id); if (el) el.style.display = 'block'; }

function extractText(cell) {
  if (cell === null || cell === undefined) return '';
  if (typeof cell === 'string') return cell.trim();
  if (typeof cell === 'number') return String(cell);
  if (Array.isArray(cell)) return cell.map(extractText).join('');
  if (typeof cell === 'object') return cell.text || cell.value || '';
  return String(cell).trim();
}

function parseUrl(url) {
  if (!url) return null;
  let m = url.match(/\/sheets\/([A-Za-z0-9]+)/); 
  if (m) return { type: 'sheets', token: m[1] };
  
  m = url.match(/\/base\/([A-Za-z0-9]+)/); 
  if (m) { 
    const tm = url.match(/[?&]table=([A-Za-z0-9]+)/); 
    return { type: 'bitable', appToken: m[1], tableId: tm ? tm[1] : null }; 
  }
  return null;
}

async function getToken() {
  if (S.token && Date.now() < S.tokenExp) return S.token;
  const res = await fetch(proxyUrl('https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal'), {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ app_id: $('appId').value.trim(), app_secret: $('appSecret').value.trim() })
  });
  const d = await res.json();
  if (d.code !== 0) throw new Error('授权失败: ' + d.msg);
  S.token = d.tenant_access_token; S.tokenExp = Date.now() + (d.expire - 60) * 1000;
  return S.token;
}

async function callQwen(sys, user) {
  const endpoint = 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';
  const apiUrl = proxyUrl(endpoint);
  
  const res = await fetch(apiUrl, {
    method: 'POST', 
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: "qwen-plus",
      messages: [
        { role: "system", content: sys },
        { role: "user", content: user }
      ],
      response_format: { type: "json_object" }
    })
  });
  
  const d = await res.json();
  if (!res.ok) throw new Error(d.error?.message || '通义千问 API 失败，请检查配置');
  
  let content = d.choices?.[0]?.message?.content || '';
  if (content.startsWith('```')) {
    content = content.replace(/^```json/im, '').replace(/```$/im, '').trim();
  }
  return content;
}

async function step1Next() {
  const appId = $('appId').value.trim(), appSecret = $('appSecret').value.trim(), sheetUrl = $('sheetUrl').value.trim();
  if (!appId || !appSecret || !sheetUrl) return setStatus('s1-status', '请补全必填配置', 'ae');
  
  const fields = ['appId', 'appSecret', 'sheetUrl', 'sheetName', 'knowledgeTableUrl', 'copyTableUrl'];
  fields.forEach(id => localStorage.setItem('xhs_' + id, $(id).value.trim()));

  setStatus('s1-status', '验证中...', 'ai');
  try { await getToken(); goStep(2); } catch (e) { setStatus('s1-status', '❌ ' + e.message, 'ae'); }
}

async function fetchSheet() {
  $('btn-fetch').disabled = true; showPw('fetch-pw'); setBar('fetch-pb', 20);
  try {
    const token = await getToken();
    const sheetToken = parseUrl($('sheetUrl').value.trim()).token;
    const metaData = await (await fetch(proxyUrl(`https://open.feishu.cn/open-apis/sheets/v3/spreadsheets/${sheetToken}/sheets/query`), { headers: { 'Authorization': 'Bearer ' + token } })).json();
    const sheets = metaData.data.sheets || [];
    const targetName = $('sheetName').value.trim();
    let targetSheet = sheets[0];
    
    if (targetName) {
      const found = sheets.find(s => s.title === targetName);
      if (found) targetSheet = found;
    }
    
    const range = `${targetSheet.sheet_id}!A1:Z500`;
    const dataJson = await (await fetch(proxyUrl(`https://open.feishu.cn/open-apis/sheets/v2/spreadsheets/${sheetToken}/values/${encodeURIComponent(range)}`), { headers: { 'Authorization': 'Bearer ' + token } })).json();
    const values = dataJson.data.valueRange.values;
    S.headers = values[0].map(h => extractText(h)); S.rawRows = values.slice(1);
    renderColMapUI(S.headers); $('col-map-card').style.display = 'block'; setBar('fetch-pb', 100);
    setStatus('s2-status', `✓ 已读取: ${targetSheet.title}`, 'as');
  } catch (e) { setStatus('s2-status', e.message, 'ae'); } finally { $('btn-fetch').disabled = false; }
}

function renderColMapUI(headers) {
  const fields = [{ key: 'title', label: '标题列' }, { key: 'body', label: '正文列' }, { key: 'product', label: '产品名称' }];
  $('col-map-wrap').innerHTML = fields.map(f => `<div class="col-map-label">${f.label}</div><select id="col-${f.key}">${headers.map((h, i) => `<option value="${i}">${h}</option>`).join('')}</select>`).join('');
}

function confirmColMap() {
  S.colMap = { title: parseInt($('col-title').value), body: parseInt($('col-body').value), product: parseInt($('col-product').value) };
  S.docContent = S.rawRows.map((row, i) => `--- ${i+1} ---\n【产品】${extractText(row[S.colMap.product])}\n【标题】${extractText(row[S.colMap.title])}\n【正文】${extractText(row[S.colMap.body])}`).join('\n\n');
  
  const usedCols = Object.values(S.colMap).filter(v => !isNaN(v) && v >= 0);
  let html = '<thead><tr>' + usedCols.map(i => `<th>${S.headers[i]||'列'+(i+1)}</th>`).join('') + '</tr></thead><tbody>';
  S.rawRows.slice(0, 5).forEach(row => { 
    html += '<tr>' + usedCols.map(i => `<td>${String(extractText(row[i])||'').slice(0,40)}...</td>`).join('') + '</tr>'; 
  });
  $('preview-table').innerHTML = html + '</tbody>';

  $('data-preview-card').style.display = 'block'; 
  setStatus('col-map-status', '✓ 素材解析成功，请点击“进入 AI 分析”', 'as');
}

async function analyzeDoc() {
  $('btn-analyze').disabled = true; showPw('analyze-pw'); setBar('analyze-pb', 40); 
  setStatus('s3-status', '通义千问 分析中...', 'ai');
  $('k-save-status').innerHTML = ''; 
  
  try {
    const res = await callQwen("你是小红书专家，分析规律。注意：必须严格输出JSON！", `素材：\n${S.docContent.slice(0,8000)}\n\n输出JSON：\n{"hook_patterns":{"title":"开头钩子","items":["点1"]},"structure_template":{"title":"结构模板","items":["点1"]},"emotion_words":{"title":"爆款词","items":["点1"]},"selling_angles":{"title":"切入角度","items":["点1"]},"cta_patterns":{"title":"引导套路","items":["点1"]},"title_formula":{"title":"标题公式","items":["点1"]},"full_report":"分析报告"}`);
    const p = JSON.parse(res); S.knowledge = p;
    $('kg-grid').innerHTML = Object.keys(p).filter(k=>k!=='full_report').map(k=>`<div class="kc"><div class="kc-l">${p[k].title}</div><div class="kc-c">${(p[k].items||[]).join('<br>')}</div></div>`).join('');
    $('full-report').textContent = p.full_report; $('knowledge-result').style.display = 'block';
    setStatus('s3-status', '✓ 分析完成，正在全自动写入飞书...', 'ai'); 
    setBar('analyze-pb', 100);
    
    await saveKnowledge();
    
  } catch (e) { setStatus('s3-status', e.message, 'ae'); } finally { $('btn-analyze').disabled = false; }
}

async function generateCopy() {
  const count = parseInt($('genCount').value) || 3;
  $('btn-gen').disabled = true; showPw('gen-pw'); setBar('gen-pb', 40); 
  setStatus('s4-status', '通义千问 生成中...', 'ai');
  $('c-save-status').innerHTML = ''; 

  try {
    // ── 核心排版指令强化 ──
    const sysPrompt = "你是顶尖小红书爆款写手。必须严格遵守字数、换行排版规则，严格输出JSON格式。";
    const userPrompt = `产品：${$('prodName').value}\n卖点：${$('prodSell').value}\n参考：${JSON.stringify(S.knowledge)}\n\n要求：
1. 请一共生成 ${count} 个不同风格的版本。
2. 【标题强制要求】：小红书标题字数严格限制在20个字符以内（含标点和表情），越短越好！
3. 【正文排版强制要求】（极其重要）：小红书手机端每行最多显示23个字。为了完美的视觉体验，正文（body）必须频繁换行！请确保正文的**每一行绝对不超过23个字符**（包含标点和表情）。写到18-22个字就必须强制加一个换行符（\\n）。
4. 【视觉节奏】：多用短句，善用表情符号（Emoji），段落之间要有空行留白，绝对不能出现大段密集的文字。
5. 必须输出严格的JSON。

输出JSON：{"copies":[{"index":1,"style":"风格","title":"小于20字的短标题","body":"严格控制行字数、频繁换行的正文"}]}`;
    
    const res = await callQwen(sysPrompt, userPrompt);
    const p = JSON.parse(res); S.copies = p.copies || p;
    
    $('copy-cards').innerHTML = (S.copies).map(c=>{
      const len = c.title.length;
      const lenColor = len > 20 ? 'color:red;' : 'color:#888;';
      return `<div class="card"><div style="font-weight:600">${c.title} <span style="font-size:11px;${lenColor}font-weight:normal;">(${len} 字符)</span></div><div style="font-size:13px;line-height:2;white-space:pre-wrap;margin-top:12px">${c.body}</div></div>`;
    }).join('');
    
    $('copy-results').style.display = 'block'; 
    setStatus('s4-status', '✓ 生成完成，正在全自动同步至飞书...', 'ai'); 
    setBar('gen-pb', 100);
    
    await saveCopy();
    
  } catch (e) { setStatus('s4-status', e.message, 'ae'); } finally { $('btn-gen').disabled = false; }
}

async function ensureTable(token, type) {
  const url = (type === 'knowledge' ? $('knowledgeTableUrl') : $('copyTableUrl')).value.trim();
  if (!url) throw new Error("缺少表格链接！");
  
  const p = parseUrl(url); 
  if (!p || !p.appToken) throw new Error("链接格式错误，必须包含 /base/");

  let tableId = p.tableId;
  if (!tableId) {
    const res = await fetch(proxyUrl(`https://open.feishu.cn/open-apis/bitable/v1/apps/${p.appToken}/tables`), { headers: { 'Authorization': 'Bearer ' + token } });
    const d = await res.json();
    if (d.code === 0 && d.data && d.data.items && d.data.items.length > 0) {
      tableId = d.data.items[0].table_id;
    } else {
      throw new Error("无法读取多维表格，请检查机器人权限");
    }
  }
  return { appToken: p.appToken, tableId: tableId };
}

async function saveKnowledge() {
  if (!S.knowledge) return;
  const url = $('knowledgeTableUrl').value.trim();
  if (!url) { setStatus('k-save-status', '⚠️ 知识点生成成功，但未填写输出表格链接，取消自动同步。', 'aw'); return; }
  
  try {
    const token = await getToken();
    const { appToken, tableId } = await ensureTable(token, 'knowledge');
    const records = Object.keys(S.knowledge).filter(k=>k!=='full_report' && S.knowledge[k] && S.knowledge[k].title).map(k=>{
      const items = S.knowledge[k].items;
      const text = Array.isArray(items) ? items.join('\n') : String(items || '');
      return { fields: { '分析维度': S.knowledge[k].title, '内容': text, '更新时间': new Date().toLocaleDateString() } };
    });
    await batchWrite(token, appToken, tableId, records);
    setStatus('s3-status', '✓ 分析完成，并且已全自动写入飞书！', 'as');
  } catch (e) { 
    setStatus('k-save-status', '❌ 自动同步失败：' + e.message, 'ae');
  }
}

async function saveCopy() {
  if (!S.copies || !S.copies.length) return;
  const url = $('copyTableUrl').value.trim();
  if (!url) { setStatus('c-save-status', '⚠️ 文案生成成功，但未填写输出表格链接，取消自动同步。', 'aw'); return; }
  
  try {
    const token = await getToken();
    const { appToken, tableId } = await ensureTable(token, 'copy');
    const records = S.copies.map(c=>({ fields: { '产品名称': $('prodName').value, '文案标题': c.title, '正文内容': c.body, '状态': '待发布' } }));
    await batchWrite(token, appToken, tableId, records);
    setStatus('s4-status', '✓ 生成完成，并且已全自动同步至飞书！', 'as');
  } catch (e) { 
    setStatus('c-save-status', '❌ 自动同步失败：' + e.message, 'ae');
  }
}

async function batchWrite(token, appToken, tableId, records) {
  const res = await fetch(proxyUrl(`https://open.feishu.cn/open-apis/bitable/v1/apps/${appToken}/tables/${tableId}/records/batch_create`), {
    method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ records })
  });
  const d = await res.json(); if (d.code !== 0) throw new Error(d.msg);
}
